; Protocol.ini section for the Broadcom NetXtreme II 10Gbps Ethernet NDIS2
[BNX2EV]
    DriverName = "BNX2EV$"

; BusNum from 0 to 255
;    BusNum =

; DevNum from 0 to 31
;    DevNum =

; PortNum or FuncNum from 0 to 7
;    PortNum =
;    FuncNum =

; LinSpeed can be set to 10 or 100 (FUTURE IMPLEMENTATION)
;    LineSpeed =

; Duplex can be set to half or full. LineSpeed is required when this keyword is used. (FUTURE IMPLEMENTATION)
;    Duplex =

; NodeAddress specifies the network address used.
;    NodeAddress =


; FixCheckSumOff turns off the driver's work-around for the TCP/IP stack to recognize
; the 1's complimented version of the checksum.
; FixCheckSumOff


;AcceptAllMC informs the driver to deliver ALL Multicast packets to the upper Protocol.
;AcceptAllMC

;
; To add more adapter(up to 4) repeat the below entry, where n can be from 2 to 4.
;

;[BNX2EV_n]
;    DriverName = "BNX2EVn$"
;    BusNum =
;    DevNum =
;    PortNum =
;    FuncNum =
;    LineSpeed =
;    Duplex =
;    NodeAddress =
;    FixCheckSumOff
;    AcceptAllMC
